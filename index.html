<script>

let currentPath = "";
let userAddress = "";

function generate(){

  const paths = [
    "boss",
    "free",
    "lazy",
    "matrix",
    "reader",
    "transcend",
    "warrior",
    "wizard",
    "ally",
    "alpha",
    "athlete",
    "creator"
  ];

  const random = paths[Math.floor(Math.random()*paths.length)];

  currentPath = random;

  document.getElementById("result").src = random + ".jpg";
const glowColors = {
  boss: "gold",
  free: "#ffffff",
  lazy: "#66ff66",
  matrix: "#ff00ff",
  reader: "#99ff66",
  transcend: "#ff4444",
  warrior: "#ff3333",
  wizard: "#00ccff",
  ally: "#ffcc66",
  alpha: "#00e5ff",
  athlete: "#00ffee",
  creator: "#bb55ff",
};

document.getElementById("result").style.boxShadow =
  "0 0 25px " + glowColors[random] +
  ", 0 0 50px " + glowColors[random];

  if(userAddress){
    if(confirm("Save this path on Ritual?")){
      sendToRitual(random);
    }
  }

}

function downloadImage(){

  if(!currentPath){
    alert("Generate first");
    return;
  }

  fetch(currentPath + ".jpg")
    .then(res => res.blob())
    .then(blob => {

      const url = window.URL.createObjectURL(blob);

      const a = document.createElement("a");

      a.href = url;
      a.download = currentPath + ".jpg";

      document.body.appendChild(a);

      a.click();

      a.remove();
    });

}

function shareX(){

  if(!currentPath){
    alert("Generate first");
    return;
  }

  const url = "https://ritual-fate-engine.netlify.app/";

  const text =
"I revealed my Ritual path 🔮 (" +
currentPath.toUpperCase() +
")\n\nTry yours:\n" +
url +
"\n\nBuilt on @ritualnet" +
"\nCreated by @murataydn_34";

  window.open(
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent(text),
    "_blank"
  );

}

async function sendToRitual(path){

  
  try{

    const tx = await window.ethereum.request({

  method: "eth_sendTransaction",

  params: [{

  from: userAddress,
  to: userAddress,

  value: "0x0"

}]

});

   
  alert("Saved on Ritual 🔮\nTX: " + tx);

  }catch(err){

    console.log(err);

  }

}

async function switchToRitual(){

  try{

    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x7890ce" }]
    });

  }catch(err){

    
console.log(err);

  }

}

async function connectWallet(){

  if(typeof window.ethereum === "undefined"){
    alert("Install Metamask");
    return;
  }

  try{

    const accounts =
      await window.ethereum.request({
        method: "eth_requestAccounts"
      });

    userAddress = accounts[0];

    
    document.getElementById("wallet").innerText =
      "Connected: " +
      userAddress.slice(0,6) +
      "..." +
      userAddress.slice(-4);

  }catch(err){

    console.log(err);

  }

}

</script>
